{% extends "base.html" %}
{% block title %}Add Inventory{% endblock %}
{% block content %}
<div class="card">
    <h2>Add Inventory Item</h2>
    <form method="POST">
        <div class="form-group">
            <label>Stone Type</label>
            <select name="stone_type" required>
                <option value="">Select Stone Type</option>
                <option value="Granite">Granite</option>
                <option value="Limestone">Limestone</option>
                <option value="Marble">Marble</option>
                <option value="Sandstone">Sandstone</option>
                <option value="Slate">Slate</option>
            </select>
        </div>
        <div class="form-group">
            <label>Size</label>
            <select name="size" required>
                <option value="">Select Size</option>
                <option value="5mm">5mm</option>
                <option value="10mm">10mm</option>
                <option value="20mm">20mm</option>
                <option value="40mm">40mm</option>
                <option value="65mm">65mm</option>
            </select>
        </div>
        <div class="form-group">
            <label>Opening Stock (tons)</label>
            <input type="number" name="opening_stock" step="0.01" value="0">
        </div>
        <div class="form-group">
            <label>Purchases (tons)</label>
            <input type="number" name="purchases" step="0.01" value="0">
        </div>
        <div class="form-group">
            <label>Sales (tons)</label>
            <input type="number" name="sales" step="0.01" value="0">
        </div>
        <div class="form-group">
            <label>Rate per Ton</label>
            <input type="number" name="rate_per_ton" step="0.01" value="0">
        </div>
        <button type="submit" class="btn btn-success">Add Item</button>
        <a href="{{ url_for('inventory.index') }}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
