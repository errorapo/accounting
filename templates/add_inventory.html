{% extends "base.html" %}
{% block page_title %}Add Inventory{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title">Add Inventory Item</div>
    </div>
    
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Stone Type</label>
                <select name="stone_type" class="form-input" required>
                    <option value="">Select Stone Type</option>
                    <option value="Granite">Granite</option>
                    <option value="Limestone">Limestone</option>
                    <option value="Marble">Marble</option>
                    <option value="Sandstone">Sandstone</option>
                    <option value="Slate">Slate</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Size</label>
                <select name="size" class="form-input" required>
                    <option value="">Select Size</option>
                    <option value="5mm">5mm</option>
                    <option value="10mm">10mm</option>
                    <option value="20mm">20mm</option>
                    <option value="40mm">40mm</option>
                    <option value="65mm">65mm</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Opening Stock (tons)</label>
                <input type="number" name="opening_stock" class="form-input" step="0.01" value="0">
            </div>
            
            <div class="form-group">
                <label class="form-label">Rate per Ton (₹)</label>
                <input type="number" name="rate_per_ton" class="form-input" step="0.01" value="0">
            </div>
        </div>
        
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Add Item</button>
            <a href="{{ url_for('inventory.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
