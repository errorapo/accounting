{% extends "base.html" %}
{% block title %}Edit Vendor{% endblock %}
{% block content %}
<div class="card">
    <h2>Edit Vendor</h2>
    <form method="post">
        <div class="form-group">
            <label>Vendor Name *</label>
            <input type="text" name="name" value="{{ vendor.name }}" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ vendor.phone }}">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3">{{ vendor.address }}</textarea>
        </div>
        <div class="form-group">
            <label>GSTIN</label>
            <input type="text" name="gstin" value="{{ vendor.gstin }}">
        </div>
        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" value="{{ vendor.state }}">
        </div>
        <button type="submit" class="btn">Update Vendor</button>
        <a href="{{ url_for('vendor.vendors_list') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
