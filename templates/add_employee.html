{% extends "base.html" %}
{% block page_title %}Add Employee{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title">Add Employee</div>
    </div>
    
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-input" placeholder="Full name" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Employee Type</label>
                <select name="employee_type" class="form-input" required>
                    <option value="">Select Type</option>
                    <option value="Driver">Driver</option>
                    <option value="Machine Operator">Machine Operator</option>
                    <option value="Manual Labour">Manual Labour</option>
                    <option value="Supervisor">Supervisor</option>
                    <option value="Office Staff">Office Staff</option>
                    <option value="Security">Security</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Base Salary (₹)</label>
                <input type="number" name="base_salary" class="form-input" step="0.01" value="15000" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Hourly Rate (₹)</label>
                <input type="number" name="hourly_rate" class="form-input" step="0.01" value="80" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">PF Rate (%)</label>
                <input type="number" name="pf_rate" class="form-input" step="0.01" value="12" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Transport Allowance (₹)</label>
                <input type="number" name="transport_allowance" class="form-input" step="0.01" value="2000">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Food Allowance (₹)</label>
                <input type="number" name="food_allowance" class="form-input" step="0.01" value="1500">
            </div>
            
            <div class="form-group">
                <label class="form-label">Housing Allowance (₹)</label>
                <input type="number" name="housing_allowance" class="form-input" step="0.01" value="3000">
            </div>
        </div>
        
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Add Employee</button>
            <a href="{{ url_for('payroll.employees') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
