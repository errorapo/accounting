{% extends "base.html" %}
{% block page_title %}Add Customer{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title">Add Customer</div>
    </div>
    
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label">Customer Name</label>
            <input type="text" name="name" class="form-input" placeholder="Company or individual name" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-input" pattern="[0-9+\s\-()]{7,15}" placeholder="9876543210">
        </div>
        
        <div class="form-group">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-input" rows="3" placeholder="Full address"></textarea>
        </div>
        
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Add Customer</button>
            <a href="{{ url_for('sales.customers') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
