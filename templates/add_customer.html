{% extends "base.html" %}
{% block title %}Add Customer{% endblock %}
{% block content %}
<div class="card">
    <h2>Add Customer</h2>
    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" pattern="[0-9+\s\-()]{7,15}" title="Enter valid phone number (7-15 digits)">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Add Customer</button>
        <a href="{{ url_for('sales.customers') }}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
