{% extends "base.html" %}
{% block page_title %}Add Vendor{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title">Add Vendor</div>
    </div>
    
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label">Vendor Name *</label>
            <input type="text" name="name" class="form-input" placeholder="Company name" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" name="phone" class="form-input" placeholder="9876543210">
            </div>
            
            <div class="form-group">
                <label class="form-label">GSTIN</label>
                <input type="text" name="gstin" class="form-input" placeholder="27AAAAA0000A1Z1">
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">State</label>
            <input type="text" name="state" class="form-input" placeholder="Maharashtra">
        </div>
        
        <div class="form-group">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-input" rows="3" placeholder="Full address"></textarea>
        </div>
        
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Save Vendor</button>
            <a href="{{ url_for('vendor.vendors_list') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
