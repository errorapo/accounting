{% extends "base.html" %}
{% block title %}Create Payroll{% endblock %}
{% block content %}
<div class="card">
    <h2>Create Monthly Payroll</h2>
    <form method="POST">
        <div class="form-group">
            <label>Select Employee</label>
            <select name="employee_id" required>
                <option value="">Select Employee</option>
                {% for employee in employees %}
                <option value="{{ employee.id }}">{{ employee.name }} - {{ employee.employee_type }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Month</label>
            <select name="month" required>
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>
        <div class="form-group">
            <label>Year</label>
            <input type="number" name="year" value="2026" required>
        </div>
        <div class="form-group">
            <label>Overtime Hours</label>
            <input type="number" name="overtime_hours" step="0.01" value="0">
        </div>
        <div class="form-group">
            <label>Bonus/Incentive</label>
            <input type="number" name="bonus" step="0.01" value="0">
        </div>
        <div class="form-group">
            <label>Tax Deduction (TDS)</label>
            <input type="number" name="tax_deduction" step="0.01" value="0">
        </div>
        <div class="form-group">
            <label>Insurance</label>
            <input type="number" name="insurance" step="0.01" value="0">
        </div>
        <button type="submit" class="btn btn-success">Calculate & Create Payroll</button>
        <a href="{{ url_for('dashboard.index') }}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
