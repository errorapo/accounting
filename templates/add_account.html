{% extends "base.html" %}
{% block page_title %}Add Account{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title">Add Account</div>
    </div>
    
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label">Account Name</label>
            <input type="text" name="name" class="form-input" placeholder="Account name" required>
        </div>
        
        <div class="form-group">
            <label class="form-label">Account Type</label>
            <select name="account_type" class="form-input" required>
                <option value="">Select Type</option>
                <option value="asset">Asset</option>
                <option value="liability">Liability</option>
                <option value="capital">Capital</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>
        
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Add Account</button>
            <a href="{{ url_for('accounts.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
